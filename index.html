<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 1.75rem 2rem;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 0.4rem;
    }

    .question {
      font-size: 1.05rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 1.1rem;
      line-height: 1.4;
    }

    /* ── Rating buttons ── */
    .ratings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .rating-btn {
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      padding: 0.6rem 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .rating-btn:hover        { border-color: #6366f1; background: #eef2ff; color: #4338ca; }
    .rating-btn.selected     { border-color: #6366f1; background: #eef2ff; color: #4338ca; }
    .rating-btn:disabled     { opacity: 0.5; cursor: default; }

    /* ── Divider ── */
    .sep { border: none; border-top: 1px solid #f3f4f6; margin: 1.1rem 0; }

    /* ── Sales CTA ── */
    .cta-label {
      font-size: 0.82rem;
      color: #6b7280;
      margin-bottom: 0.55rem;
    }

    .sales-btn {
      display: block;
      width: 100%;
      padding: 0.65rem 1rem;
      background: #16a34a;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .sales-btn:hover { background: #15803d; }

    /* ── Thank-you state ── */
    .thankyou { display: none; text-align: center; padding: 0.5rem 0; }
    .thankyou .big-emoji { font-size: 2rem; margin-bottom: 0.5rem; }
    .thankyou .message   { font-size: 1rem; font-weight: 600; color: #111827; margin-bottom: 0.25rem; }
    .thankyou .sub       { font-size: 0.85rem; color: #6b7280; margin-bottom: 1.1rem; }

    /* ── Error ── */
    .error { font-size: 0.82rem; color: #dc2626; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>

<div class="card">

  <!-- ── Survey state ── -->
  <div id="survey-state">
    <div class="eyebrow">Quick poll</div>
    <div class="question">How helpful was this article?</div>

    <div class="ratings" id="rating-btns">
      <button class="rating-btn" data-value="awesome" data-emoji="🚀">🚀 Awesome</button>
      <button class="rating-btn" data-value="good"    data-emoji="👍">👍 Pretty Good</button>
      <button class="rating-btn" data-value="ok"      data-emoji="😐">😐 Just OK</button>
      <button class="rating-btn" data-value="poor"    data-emoji="👎">👎 Not Helpful</button>
    </div>

    <div class="error" id="submit-error">Something went wrong — please try again.</div>

    <hr class="sep" />

    <div class="cta-label">Interested in BinMaster solutions?</div>
    <a
      href="https://binmaster.com/sales-inquiry-form/"
      target="_blank"
      rel="noopener"
      class="sales-btn"
      id="sales-link"
    >Talk to Sales →</a>
  </div>

  <!-- ── Thank-you state ── -->
  <div class="thankyou" id="thankyou-state">
    <div class="big-emoji" id="ty-emoji">🚀</div>
    <div class="message" id="ty-message">Thanks for the feedback!</div>
    <div class="sub" id="ty-sub">Your response has been recorded.</div>

    <hr class="sep" />

    <div class="cta-label">Interested in BinMaster solutions?</div>
    <a
      href="https://binmaster.com/sales-inquiry-form/"
      target="_blank"
      rel="noopener"
      class="sales-btn"
      id="sales-link-ty"
    >Talk to Sales →</a>
  </div>

</div>

<script>
  // ── CONFIG — set these before deploying ────────────────────────────────────
  const SUPABASE_URL = "https://aeoviebvxtoxqmqzsetr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlb3ZpZWJ2eHRveHFtcXpzZXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTEwNTEsImV4cCI6MjA5NzcyNzA1MX0.mfCyslW3vkS5h40R7ZtYyxW61DwFM6o0DHD1SyE9VZE";
  // ──────────────────────────────────────────────────────────────────────────

  const TABLE       = "survey_responses";
  const SALES_URL   = "https://binmaster.com/sales-inquiry-form/";
  const startTime   = Date.now();

  // Article title comes from the embedding page via query string:
  // <iframe src="https://yourname.github.io/article-survey/?title=My+Article">
  const params       = new URLSearchParams(window.location.search);
  const articleTitle = params.get("title") || document.referrer || "Unknown Article";

  let selectedRating = null;
  let voteSaved      = false;
  let salesClicked   = false;

  const MESSAGES = {
    awesome: { emoji: "🚀", message: "Awesome — glad it helped!", sub: "Your feedback means a lot." },
    good:    { emoji: "👍", message: "Great, thanks for letting us know!", sub: "We appreciate your time." },
    ok:      { emoji: "😐", message: "Thanks for the honest feedback.", sub: "We'll keep working to improve." },
    poor:    { emoji: "👎", message: "Sorry we missed the mark.", sub: "We'll use this to do better." },
  };

  // ── Save vote to Supabase ──────────────────────────────────────────────────
  async function saveVote(rating, salesWasClicked) {
    const body = {
      article_title: articleTitle,
      rating,
      clicked_sales: salesWasClicked,
      time_on_page:  Math.round((Date.now() - startTime) / 1000),
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: "POST",
      headers: {
        "apikey":        SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type":  "application/json",
        "Prefer":        "return=minimal",
      },
      body: JSON.stringify(body),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  }

  // ── Show thank-you screen ──────────────────────────────────────────────────
  function showThankyou(rating) {
    const m = MESSAGES[rating];
    document.getElementById("ty-emoji").textContent   = m.emoji;
    document.getElementById("ty-message").textContent = m.message;
    document.getElementById("ty-sub").textContent     = m.sub;
    document.getElementById("survey-state").style.display  = "none";
    document.getElementById("thankyou-state").style.display = "block";

    // Track sales clicks from thank-you screen too
    document.getElementById("sales-link-ty").addEventListener("click", () => {
      trackSalesClick(rating);
    });
  }

  // ── Track sales click (update existing row or note it) ────────────────────
  async function trackSalesClick(rating) {
    salesClicked = true;
    if (!voteSaved) return; // will be included when vote is saved
    // If they click sales AFTER voting, patch the row via a second insert
    // (simplest approach — analytics page counts either flag)
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
        method: "POST",
        headers: {
          "apikey":        SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type":  "application/json",
          "Prefer":        "return=minimal",
        },
        body: JSON.stringify({
          article_title: articleTitle,
          rating:        rating || "unknown",
          clicked_sales: true,
          time_on_page:  Math.round((Date.now() - startTime) / 1000),
        }),
      });
    } catch (e) { /* silent — not critical */ }
  }

  // ── Rating button clicks ───────────────────────────────────────────────────
  document.getElementById("rating-btns").addEventListener("click", async (e) => {
    const btn = e.target.closest(".rating-btn");
    if (!btn) return;

    selectedRating = btn.dataset.value;

    document.querySelectorAll(".rating-btn").forEach(b => {
      b.classList.toggle("selected", b === btn);
      b.disabled = true;
    });

    document.getElementById("submit-error").style.display = "none";

    try {
      await saveVote(selectedRating, salesClicked);
      voteSaved = true;
      showThankyou(selectedRating);
    } catch (err) {
      console.error(err);
      document.querySelectorAll(".rating-btn").forEach(b => b.disabled = false);
      btn.classList.remove("selected");
      document.getElementById("submit-error").style.display = "block";
    }
  });

  // ── Sales link click (before voting) ─────────────────────────────────────
  document.getElementById("sales-link").addEventListener("click", () => {
    salesClicked = true;
    // If they haven't voted yet, we'll capture clicked_sales=true when they do
    // Open the link (href handles navigation)
  });
</script>

</body>
</html>
